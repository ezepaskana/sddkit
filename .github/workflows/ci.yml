name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    name: test (node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Build native optional deps (fail loudly)
        run: npm rebuild better-sqlite3 mysql2 --foreground-scripts
      - name: Verify native deps loaded
        run: node -e "require('better-sqlite3'); require('mysql2'); console.log('native deps OK')"
      - run: npm test
