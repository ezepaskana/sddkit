name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    name: test (node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Check optional native deps
        run: |
          node -e "try { require('better-sqlite3'); console.log('better-sqlite3: OK') } catch { console.log('better-sqlite3: not available (tests will skip)') }"
          node -e "try { require('mysql2'); console.log('mysql2: OK') } catch { console.log('mysql2: not available (tests will skip)') }"
      - run: npm test
